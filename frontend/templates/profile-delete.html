<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colombiando</title>
    <link
      rel="shortcut icon"
      href="../static/img/Colombiando.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../static/css/reset.css" />
    <link rel="stylesheet" href="../static/css/base.css" />
    <link rel="stylesheet" href="../static/css/tour-card.css" />
    <link rel="stylesheet" href="../static/css/contact-form.css" />
    <link rel="stylesheet" href="../static/css/carrousel.css" />
    <link rel="stylesheet" href="../static/css/profile-card.css" />
    <link rel="stylesheet" href="../static/css/profile-settings.css" />
  </head>
  <body>
    <section class="padding-block-250">
      <div class="container set-width">
        <div class="vertical-nav-wrapper">
          <ul role="list" class="vertical-nav-list">
            <li>
              <a href="#" class="vertical-nav-list-item" id="Cuenta">Cuenta</a>
            </li>
            <li>
              <a href="" class="vertical-nav-list-item" id="Contactanos"
                >Contáctanos</a
              >
            </li>
            <div class="padding-block-100">
              <hr />
            </div>
            <li>
              <a href="" class="vertical-nav-list-item" id="Eliminar-cuenta"
                >Eliminar Cuenta</a
              >
            </li>
            <li>
              <a href="" class="vertical-nav-list-item" id="Log-out">Log Out</a>
            </li>
          </ul>
        </div>
        <div class="contact-form">
          <div>
            <div class="title-header">
              <h2 class="fs-secondary-heading">Eliminar Cuenta</h2>
              <p>Nos entristece verte ir</p>
            </div>
            <form>
              <div class="field">
                <label for="correo">Correo</label>
                <input
                  type="email"
                  id="correo"
                  placeholder="example@email.com"
                />
                <span class="error">Error</span>
              </div>
              <div class="field">
                <label for="pwd">Contraseña</label>
                <input type="password" id="pwd" placeholder="Contraseña" />
                <span class="error">Error</span>
                <a href="" class="fs-details">Olvidé la Contraseña</a>
              </div>
              <div class="field">
                <div class="checkbox-wrapper">
                  <input type="checkbox" id="politica" />
                  <label for="politica">Aprobación de alguna política</label>
                </div>
                <span class="error">Error</span>
              </div>
              <button type="submit" class="btn-submit">Eliminar Cuenta</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
