<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colombiando</title>
    <link
      rel="shortcut icon"
      href="../static/img/Colombiando.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../static/css/reset.css" />
    <link rel="stylesheet" href="../static/css/base.css" />
    <link rel="stylesheet" href="../static/css/tour-card.css" />
    <link rel="stylesheet" href="../static/css/contact-form.css" />
    <link rel="stylesheet" href="../static/css/profile-card.css" />
    <link rel="stylesheet" href="../static/css/tour.css" />
  </head>
  <body>
    <section class="padding-block-250">
      <div class="container">
        <div class="tour-information">
          <div class="tour-title">
            <h1 class="fs-primary-heading">Nombre del Tour</h1>
            <div class="tour-tags">
              <span class="tag bgr-yellow">Fecha</span>
              <span class="tag bgr-blue">Región</span>
              <span class="tag bgr-red">Clasificación</span>
            </div>
          </div>
          <div>
            <div class="review-card" id="selected-tour-guide">
              <div class="review-header">
                <div class="avatar"></div>
                <p class="user-name">Nombre del Guía</p>
              </div>
              <p class="review-body" style="display: none">Review</p>
              <div class="review-footer">
                <span style="display: none">Nombre del Tour</span>
                <span style="display: none">Nombre del guía</span>
                <span>Turno</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="padding-block-250">
      <div class="container">
        <div class="contact-form">
          <form>
            <div class="field">
              <label for="calificacion">Calificación del tour</label>
              <input
                type="number"
                id="calificacion"
                placeholder="1-10"
                min="1"
                max="10"
              />
              <span class="error">Error</span>
            </div>
            <div class="field">
              <label for="mensaje">Describe tu experencia</label>
              <textarea
                id="mensaje"
                placeholder="Describe tu experencia"
              ></textarea>
            </div>
            <div class="padding-block-150">
              <hr />
            </div>
            <div class="field">
              <label for="calificacion">Calificación del guía</label>
              <input
                type="number"
                id="calificacion"
                placeholder="1-10"
                min="1"
                max="10"
              />
              <span class="error">Error</span>
            </div>
            <div class="field">
              <label for="mensaje">Describe tu experencia</label>
              <textarea
                id="mensaje"
                placeholder="Describe tu experencia"
              ></textarea>
            </div>
            <button type="submit" class="btn-submit">Enviar Reseñar</button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
