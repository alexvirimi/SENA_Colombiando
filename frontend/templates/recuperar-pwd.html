<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colombiando</title>
    <link
      rel="shortcut icon"
      href="../static/img/Colombiando.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../static/css/reset.css" />
    <link rel="stylesheet" href="../static/css/base.css" />
    <link rel="stylesheet" href="../static/css/contact-form.css" />
  </head>
  <body>
    <section class="padding-block-250">
      <div class="container">
        <div class="contact-form max-width">
          <div class="title-header">
            <img src="../static/img/full-logo.svg" alt="" />
          </div>
          <form>
            <div class="field">
              <label for="correo">Correo</label>
              <input type="email" id="correo" placeholder="example@email.com" />
              <span class="error">Error</span>
            </div>
            <button type="submit" class="btn-submit">
              Recuperar Contraseña
            </button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
