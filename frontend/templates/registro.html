<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colombiando</title>
    <link
      rel="shortcut icon"
      href="../static/img/Colombiando.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../static/css/reset.css" />
    <link rel="stylesheet" href="../static/css/base.css" />
    <link rel="stylesheet" href="../static/css/contact-form.css" />
  </head>
  <body>
    <section class="padding-block-250">
      <div class="container">
        <div class="contact-form max-width">
          <div class="title-header">
            <img src="../static/img/full-logo.svg" alt="" />
          </div>
          <form>
            <div class="field">
              <label for="nombre">Nombre Completo</label>
              <input type="text" id="nombre" placeholder="Jane Doe" />
              <span class="error">Error</span>
            </div>
            <div class="field">
              <label for="correo">Correo</label>
              <input type="email" id="correo" placeholder="example@email.com" />
              <span class="error">Error</span>
            </div>
            <div class="field">
              <label for="celular">Celular</label>
              <div class="phone-wrapper">
                <select>
                  <option value="" disabled selected hidden>+##</option>
                  <option>+57</option>
                  <option>+01</option>
                  <option>+34</option>
                  <option>+52</option>
                </select>
                <input type="text" id="celular" placeholder="### #######" />
              </div>
              <span class="error">Error</span>
            </div>
            <div class="field">
              <label for="pwd">Contraseña</label>
              <input type="password" id="pwd" placeholder="Contraseña" />
              <span class="error">Error</span>
            </div>
            <div class="field">
              <label for="pwd">Repetir Contraseña</label>
              <input type="password" id="pwd" placeholder="Contraseña" />
              <span class="error">Error</span>
            </div>
            <div class="field">
              <div class="checkbox-wrapper">
                <input type="checkbox" id="politica" />
                <label for="politica">Aprobación de alguna política</label>
              </div>
              <span class="error">Error</span>
            </div>
            <button type="submit" class="btn-submit">Crear cuenta</button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
